<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D4F35">
<title>오스트리아 & 사운드 오브 뮤직 10일 여행</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
  <h1 id="header-title">오스트리아 & 사운드 오브 뮤직 10일 여행</h1>
  <div class="date-range" id="header-date">로딩중…</div>
  <div class="weather-links">
    <span class="weather-label">공식 기상</span>
    <a href="https://www.geosphere.at/" target="_blank" rel="noopener noreferrer">오스트리아</a>
    <a href="https://www.dwd.de/EN/Home/home_node.html" target="_blank" rel="noopener noreferrer">독일</a>
    <a href="https://www.chmi.cz/?l=en" target="_blank" rel="noopener noreferrer">체코</a>
  </div>
</header>

<section class="trip-overview" id="trip-overview" hidden></section>

<nav class="tab-bar" id="tab-bar">
  <div class="tabs" id="tabs"></div>
</nav>

<main id="main"></main>

<section class="info-section" id="info-section"></section>

<footer class="app-footer">Have a romantic trip! 🎻🏰🌸</footer>

<script>
(function () {
  "use strict";

  var DATA_URL = "data/itinerary.json";
  var suppressSpyUntil = 0;
  var detailSeq = 0;

  function $(sel, ctx) { return (ctx || document).querySelector(sel); }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (k === "class") node.className = attrs[k];
        else if (k === "text") node.textContent = attrs[k];
        else if (k === "html") node.innerHTML = attrs[k];
        else if (k.indexOf("data-") === 0) node.setAttribute(k, attrs[k]);
        else if (attrs[k] === true) node.setAttribute(k, "");
        else if (attrs[k] === false || attrs[k] == null) continue;
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children && children.length) {
      for (var i = 0; i < children.length; i++) {
        if (children[i] != null) node.appendChild(children[i]);
      }
    }
    return node;
  }

  function formatTime(ev) {
    if (ev.timeEnd) {
      var suffix = ev.timeEndNote || (ev.arrivalDayOffset ? "(+" + ev.arrivalDayOffset + "일)" : "");
      return ev.time + " ~ " + ev.timeEnd + (suffix ? " " + suffix : "");
    }
    return ev.time;
  }

  function toneClass(tone) {
    if (tone === "good" || tone === "ok") return "ok";
    if (tone === "high" || tone === "warning" || tone === "risk") return "warning";
    if (tone === "danger" || tone === "critical") return "danger";
    return "neutral";
  }

  function buildOptions(ev) {
    if (!ev.options || !ev.options.length) return null;
    var optsWrap = el("div", { class: "options" });
    ev.options.forEach(function (op) {
      var row = el("div", { class: "option-row" });
      var isRec = op.label && op.label.indexOf("추천") !== -1;
      row.appendChild(el("span", {
        class: "option-label " + (isRec ? "rec" : "alt"),
        text: op.label
      }));
      if (op.mapUrl) {
        var textWrap = el("span", { class: "option-text" });
        textWrap.appendChild(el("a", {
          class: "option-place-link",
          href: op.mapUrl,
          target: "_blank",
          rel: "noopener noreferrer",
          text: op.name || op.text || "지도 보기"
        }));
        if (op.description) {
          textWrap.appendChild(document.createTextNode(" — " + op.description));
        }
        row.appendChild(textWrap);
      } else {
        row.appendChild(el("span", { class: "option-text", text: op.text }));
      }
      optsWrap.appendChild(row);
    });
    return optsWrap;
  }

  function buildPhotoPlaceholder() {
    var ph = el("div", { class: "photo-placeholder" });
    ph.appendChild(el("div", { class: "photo-icon", text: "🏰" }));
    ph.appendChild(el("div", { class: "photo-text", text: "사진 불러오기 실패" }));
    return ph;
  }

  function buildPhoto(ev) {
    if (ev.photoFile) {
      var img = el("img", {
        src: "assets/photos/" + ev.photoFile,
        class: "place-photo",
        alt: ev.title || "",
        loading: "lazy"
      });
      img.addEventListener("error", function () {
        var ph = buildPhotoPlaceholder();
        if (img.parentNode) img.parentNode.replaceChild(ph, img);
      });
      return img;
    }
    return buildPhotoPlaceholder();
  }

  function buildMapLink(ev) {
    if (!ev.mapUrl) return null;
    var a = el("a", {
      class: "map-link",
      href: ev.mapUrl,
      target: "_blank",
      rel: "noopener noreferrer"
    });
    a.appendChild(el("span", { class: "map-link-icon", text: "📍" }));
    a.appendChild(el("span", { class: "map-link-text", text: ev.mapLabel || "지도" }));
    return a;
  }

  function buildMeta(ev) {
    var items = [];
    if (ev.bookingStatus) items.push({ label: ev.bookingStatus, tone: ev.riskLevel || "neutral" });
    if (ev.costStatus) items.push({ label: ev.costStatus, tone: "ok" });
    if (!items.length) return null;

    var wrap = el("div", { class: "status-pills" });
    items.forEach(function (item) {
      wrap.appendChild(el("span", {
        class: "status-pill " + toneClass(item.tone),
        text: item.label
      }));
    });
    return wrap;
  }

  function buildInsightList(ev) {
    var rows = [
      ["action", "할 일", ev.actionNote],
      ["risk", "주의", ev.riskNote],
      ["cost", "비용", ev.costNote],
      ["source", "근거", ev.sourceNote]
    ].filter(function (row) { return !!row[2]; });

    if (!rows.length && !ev.sourceUrl) return null;
    var wrap = el("div", { class: "insights" });
    rows.forEach(function (row) {
      var item = el("div", { class: "insight " + row[0] });
      item.appendChild(el("strong", { text: row[1] }));
      item.appendChild(el("span", { text: row[2] }));
      wrap.appendChild(item);
    });
    if (ev.sourceUrl) {
      var item = el("div", { class: "insight source" });
      item.appendChild(el("strong", { text: "링크" }));
      item.appendChild(el("a", {
        href: ev.sourceUrl,
        target: "_blank",
        rel: "noopener noreferrer",
        text: ev.sourceLabel || "공식 링크"
      }));
      wrap.appendChild(item);
    }
    return wrap;
  }

  function renderEvent(ev) {
    var card = el("div", { class: "card" });

    // --- Always visible area ---
    card.appendChild(el("div", { class: "time-badge", text: formatTime(ev) }));

    var titleRow = el("div", { class: "title-row" });
    if (ev.emoji) titleRow.appendChild(el("span", { class: "emoji", text: ev.emoji }));
    titleRow.appendChild(el("span", { class: "title", text: ev.title || "" }));
    card.appendChild(titleRow);

    if (ev.memo) {
      card.appendChild(el("div", { class: "memo", text: ev.memo }));
    }

    if (ev.tags && ev.tags.length) {
      var pills = el("div", { class: "pills" });
      ev.tags.forEach(function (t) {
        pills.appendChild(el("span", { class: "pill", text: t }));
      });
      card.appendChild(pills);
    }

    var meta = buildMeta(ev);
    if (meta) card.appendChild(meta);

    // --- Collapsible detail area ---
    var hasDescription = !!ev.description;
    var hasPhoto = !!ev.photoFile;
    var hasOptions = ev.options && ev.options.length;
    var hasTip = !!ev.tip;
    var insights = buildInsightList(ev);
    var hasDetail = hasDescription || hasPhoto || hasOptions || hasTip || !!insights;

    if (hasDetail) {
      var detailId = "detail-" + (++detailSeq);
      var detail = el("div", {
        class: "card-detail",
        id: detailId,
        hidden: true,
        inert: true,
        "aria-hidden": "true"
      });
      detail.inert = true;

      if (hasDescription) {
        detail.appendChild(el("div", { class: "description", text: ev.description }));
      }
      if (hasPhoto) {
        detail.appendChild(buildPhoto(ev));
      }
      if (hasOptions) {
        detail.appendChild(buildOptions(ev));
      }
      if (hasTip) {
        detail.appendChild(el("div", { class: "tip", text: "💡 " + ev.tip }));
      }
      if (insights) {
        detail.appendChild(insights);
      }

      card.appendChild(detail);

      var toggle = el("button", {
        class: "detail-toggle",
        type: "button",
        "aria-expanded": "false",
        "aria-controls": detailId
      });
      var toggleText = el("span", { class: "toggle-text", text: "상세 정보" });
      var chev = el("span", { class: "chev", text: "▾" });
      toggle.appendChild(toggleText);
      toggle.appendChild(chev);

      toggle.addEventListener("click", function () {
        var isOpen = toggle.getAttribute("aria-expanded") !== "true";
        detail.hidden = !isOpen;
        detail.inert = !isOpen;
        if (isOpen) detail.removeAttribute("inert");
        else detail.setAttribute("inert", "");
        detail.setAttribute("aria-hidden", isOpen ? "false" : "true");
        detail.classList.toggle("open", isOpen);
        toggle.classList.toggle("open", isOpen);
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        toggleText.textContent = isOpen ? "접기" : "상세 정보";
      });

      card.appendChild(toggle);
    }

    // 지도 링크 — 항상 표시 영역 (카드 하단)
    var mapLink = buildMapLink(ev);
    if (mapLink) {
      card.appendChild(mapLink);
    }

    var wrap = el("div", { class: "event", "data-type": ev.type || "transport" }, [card]);
    return wrap;
  }

  function renderDay(day) {
    var section = el("section", {
      class: "day-section",
      id: "day-" + day.dayNum
    });

    var header = el("div", { class: "day-header" });
    var top = el("div");
    top.appendChild(el("span", { class: "day-label", text: day.label }));
    top.appendChild(el("span", { class: "day-date", text: day.date }));
    header.appendChild(top);
    header.appendChild(el("div", { class: "day-theme", text: day.theme }));
    section.appendChild(header);

    var timeline = el("div", { class: "timeline" });
    (day.events || []).forEach(function (ev) {
      timeline.appendChild(renderEvent(ev));
    });
    section.appendChild(timeline);

    return section;
  }

  function renderTabs(days) {
    var tabsRoot = $("#tabs");
    tabsRoot.innerHTML = "";
    tabsRoot.setAttribute("role", "list");
    days.forEach(function (d, idx) {
      var btn = el("button", {
        class: "tab" + (idx === 0 ? " active" : ""),
        "data-target": "day-" + d.dayNum,
        "aria-current": idx === 0 ? "true" : "false",
        type: "button",
        text: d.label
      });
      btn.addEventListener("click", function () {
        var target = document.getElementById(this.getAttribute("data-target"));
        if (target) {
          setActiveTab(this);
          suppressSpyUntil = Date.now() + 1200;
          var tabBar = $("#tab-bar");
          var offset = (tabBar ? tabBar.offsetHeight : 48) + 4;
          var rect = target.getBoundingClientRect();
          var targetY = window.pageYOffset + rect.top - offset;
          window.scrollTo({ top: targetY, behavior: "smooth" });
        }
      });
      tabsRoot.appendChild(btn);
    });
  }

  function setActiveTab(btn) {
    var all = document.querySelectorAll(".tab");
    for (var i = 0; i < all.length; i++) {
      all[i].classList.remove("active");
      all[i].setAttribute("aria-current", "false");
    }
    btn.classList.add("active");
    btn.setAttribute("aria-current", "true");

    // 활성화된 탭이 화면 중앙 근처에 오도록 가로 스크롤 이동
    var tabBar = $("#tab-bar");
    if (tabBar) {
      var centerScroll = btn.offsetLeft - (tabBar.clientWidth / 2) + (btn.clientWidth / 2);
      tabBar.scrollTo({ left: centerScroll, behavior: "smooth" });
    }
  }

  function renderOverview(data) {
    var root = $("#trip-overview");
    root.innerHTML = "";
    if (!data || !data.days || !data.days.length) {
      root.hidden = true;
      return;
    }
    root.hidden = false;

    var head = el("div", { class: "trip-overview-head" });
    var titleWrap = el("div");
    titleWrap.appendChild(el("p", { class: "eyebrow", text: "10일 여행 계획" }));
    titleWrap.appendChild(el("h2", { text: "뮌헨 인, 프라하 아웃으로 흐르는 알프스 & 음악 루트" }));
    titleWrap.appendChild(el("p", {
      class: "overview-sub",
      text: "도시 이동은 열차 중심, 잘츠부르크 교외와 살츠카머구트만 렌터카로 묶은 실행형 일정입니다."
    }));
    head.appendChild(titleWrap);
    root.appendChild(head);

    var route = el("div", { class: "route-strip" });
    ["뮌헨", "퓌센", "잘츠부르크", "살츠카머구트", "비엔나", "프라하"].forEach(function (place, idx, arr) {
      route.appendChild(el("span", { class: "route-place", text: place }));
      if (idx < arr.length - 1) route.appendChild(el("span", { class: "route-arrow", text: "→" }));
    });
    root.appendChild(route);

    if (data.routeMapUrl) {
      var routeActions = el("div", { class: "overview-actions" });
      routeActions.appendChild(el("a", {
        class: "overview-route-link",
        href: data.routeMapUrl,
        target: "_blank",
        rel: "noopener noreferrer",
        text: "전체 경로 지도"
      }));
      root.appendChild(routeActions);
    }

    var cards = el("div", { class: "overview-grid" });
    [
      ["숙박 흐름", "뮌헨 1박 → 잘츠부르크 2박 → 장크트길겐 1박 → 비엔나 3박 → 프라하 2박"],
      ["이동 전략", "뮌헨·잘츠부르크·비엔나·프라하는 열차 중심, 알프스 호수권은 2일 렌터카"],
      ["예약 우선", "항공권 확정 뒤 노이슈반슈타인, 쇤브룬, 공연 티켓 순서로 고정"],
      ["오늘 볼 것", "아래 Day 탭에서 날짜별 동선, 지도, 식당 후보, 예약 메모를 바로 확인"]
    ].forEach(function (item) {
      var card = el("article", { class: "overview-card" });
      card.appendChild(el("span", { class: "overview-card-label", text: item[0] }));
      card.appendChild(el("p", { text: item[1] }));
      cards.appendChild(card);
    });
    root.appendChild(cards);
  }

  function setupScrollSpy(days) {
    var sections = days.map(function (d) {
      return document.getElementById("day-" + d.dayNum);
    });

    function onScroll() {
      if (Date.now() < suppressSpyUntil) return;
      var tabBar = $("#tab-bar");
      var offset = (tabBar ? tabBar.offsetHeight : 48) + 20;
      var activeIdx = 0;
      for (var i = 0; i < sections.length; i++) {
        if (!sections[i]) continue;
        var top = sections[i].getBoundingClientRect().top;
        if (top - offset <= 0) activeIdx = i;
      }
      var atBottom = (window.innerHeight + window.pageYOffset) >=
                     (document.body.scrollHeight - 6);
      if (atBottom) activeIdx = sections.length - 1;

      var tabs = document.querySelectorAll(".tab");
      if (tabs[activeIdx] && !tabs[activeIdx].classList.contains("active")) {
        setActiveTab(tabs[activeIdx]);
      }
    }

    var ticking = false;
    window.addEventListener("scroll", function () {
      if (!ticking) {
        window.requestAnimationFrame(function () {
          onScroll();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  }

  function renderInfo(info) {
    var root = $("#info-section");
    root.innerHTML = "";
    root.appendChild(el("h2", { text: "실용정보" }));

    function makeCard(icon, title, items) {
      var card = el("div", { class: "info-card" });
      card.appendChild(el("h3", { text: icon + " " + title }));
      var ul = el("ul");
      (items || []).forEach(function (t) {
        ul.appendChild(el("li", { text: t }));
      });
      card.appendChild(ul);
      return card;
    }

    if (info) {
      root.appendChild(makeCard("🚆", "교통 꿀팁", info.transport || []));
      root.appendChild(makeCard("🌤️", "날씨 & 계절 가이드", info.weather || []));
    }
  }

  function init(data) {
    document.title = data.title;
    $("#header-title").textContent = data.title;
    $("#header-date").textContent = data.dateRange;

    renderTabs(data.days);

    var main = $("#main");
    main.innerHTML = "";
    data.days.forEach(function (day) {
      main.appendChild(renderDay(day));
    });

    renderInfo(data.info);
    renderOverview(data);
    setupScrollSpy(data.days);
  }

  function fetchJson(url, required) {
    return fetch(url, { cache: "no-cache" })
      .then(function (r) {
        if (!r.ok) {
          if (required) throw new Error("Failed to load: " + url + " (" + r.status + ")");
          return null;
        }
        return r.json();
      })
      .catch(function (err) {
        if (required) throw err;
        console.warn(err);
        return null;
      });
  }

  fetchJson(DATA_URL, true)
    .then(init)
    .catch(function (err) {
      console.error(err);
      $("#main").innerHTML =
        '<div style="padding:20px;color:#c0392b;font-size:14px;">' +
        '데이터를 불러오지 못했습니다: ' + (err && err.message ? err.message : err) +
        '</div>';
    });
})();
</script>

</body>
</html>
